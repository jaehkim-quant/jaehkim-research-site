name: Deploy Staging

on:
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - x64
      - staging
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate staging runtime
        env:
          DEPLOY_PATH: /home/ubuntu/apps/jaehkim-research-site
        run: |
          missing=()

          command -v rsync >/dev/null 2>&1 || missing+=("rsync")
          command -v docker >/dev/null 2>&1 || missing+=("docker")
          [ -d "$DEPLOY_PATH" ] || missing+=("$DEPLOY_PATH")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing self-hosted runner requirements: ${missing[*]}"
            exit 1
          fi

      - name: Sync repository to staging directory
        env:
          DEPLOY_PATH: /home/ubuntu/apps/jaehkim-research-site
        run: |
          rsync -az --delete \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=.env.local \
            --exclude=.env.staging \
            --exclude=.DS_Store \
            ./ "$DEPLOY_PATH"/

      - name: Deploy on self-hosted runner
        env:
          DEPLOY_PATH: /home/ubuntu/apps/jaehkim-research-site
        run: |
          cd "$DEPLOY_PATH"
          bash scripts/deploy-staging.sh
